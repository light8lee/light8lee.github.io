---
layout: default
---
<article class="post note">
  <header class="post-hero">
    <p class="post-date">SCPO source note</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
    <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
    {% if page.source_file %}
    <p><a href="{{ page.source_file | relative_url }}">View raw Markdown</a></p>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
