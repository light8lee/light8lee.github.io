---
layout: default
---
<article class="post">
  <header class="post-hero">
    <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
    <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
    {% if page.tags %}
    <div class="tag-list">
      {% for tag in page.tags %}
      <span>{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
