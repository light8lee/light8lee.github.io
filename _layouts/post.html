---
layout: default
---
<div class="post-layout" data-post-layout>
  <aside class="post-toc" data-post-toc hidden>
    <button class="post-toc-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="post-toc-list"
            data-post-toc-toggle>
      <span>本文目录</span>
      <span aria-hidden="true">⌄</span>
    </button>
    <nav id="post-toc-list"
         class="post-toc-list"
         aria-label="本文目录"
         data-post-toc-list></nav>
  </aside>
  <article class="post">
    <header class="post-hero">
      <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.summary %}
      <p class="post-summary">{{ page.summary }}</p>
      {% endif %}
      {% if page.tags %}
      <div class="tag-list">
        {% for tag in page.tags %}
        <span>{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </header>
    <div class="post-content" data-post-content>
      {{ content }}
    </div>
  </article>
</div>
