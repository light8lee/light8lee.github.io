<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="alternate" type="application/atom+xml" title="Recent Entries" href="{{ site.feed | relative_url }}">
    <link rel="shortcut icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ '/css/syntax.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">
  </head>
  <body class="page-shell {% if page.body_class %}{{ page.body_class }}{% endif %}">
    {% include site-header.html %}
    <main class="site-main">
      {{ content }}
    </main>
    {% include site-footer.html %}
    {% if page.animation == 'home-constellation' %}
    <script src="{{ '/assets/js/animations/home-constellation.js' | relative_url }}" defer></script>
    {% endif %}
    {% if page.layout == 'post' %}
    <script src="{{ '/assets/js/post-navigation.js' | relative_url }}" defer></script>
    {% endif %}
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'neutral',
        flowchart: { htmlLabels: true },
        sequence: { useMaxWidth: true }
      });

      document.addEventListener('DOMContentLoaded', async function () {
        var blocks = Array.prototype.slice.call(document.querySelectorAll('pre > code.language-mermaid'));
        blocks.forEach(function (block) {
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.textContent = block.textContent;
          block.parentNode.replaceWith(container);
        });

        if (blocks.length) {
          await mermaid.run({ querySelector: '.mermaid' });
        }
      });
    </script>
  </body>
</html>
