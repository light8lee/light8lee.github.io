# Where things are
source:       .
destination:  ./_site
plugins_dir:      ./_plugins
layouts_dir:      ./_layouts
paginate:     8

# Handling Reading
safe:         false
include:      [".htaccess"]
exclude:      []
keep_files:   [".git", ".svn"]
encoding:     "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
textile_ext:  "textile"

# Filtering Content
show_drafts:  null
limit_posts:  0
future:       true
unpublished:  false

# Conversion
markdown:     kramdown
highlighter:  rouge
lsi:          false
excerpt_separator: "\n\n"

# Serving
detach:       false
port:         4000
host:         127.0.0.1
baseurl: ""

# Outputting
permalink:     date
paginate_path: /page:num
timezone:      null


# Site config
title: 涛涛涛
description: Agent RL, technical writing, visual explainers, and engineering notes.
keywords: Agent RL, reinforcement learning, LLM agents, technical writing, visualization
url: https://light8lee.github.io
feed: /atom.xml
favicon: /images/shortcut.jpg

# Nav config
nav:
  - text: Home
    url: /
  - text: Writing
    url: /archives.html
  - text: Projects
    url: /pages/projects.html
  - text: Notes
    url: /pages/notes.html
  - text: About
    url: /about.html

home_tag_filters:
  - 智能体
  - 智能体运行时
  - 强化学习
  - 后训练
  - 偏好对齐
  - 安全对齐
  - 长上下文
  - 记忆系统
  - 工具调用
  - 多智能体
  - 基准评测
  - 大模型
  - 模型架构
  - 策略优化

# Author config
author:
    name: 涛涛涛
    email: light8lee@foxmail.com
    imageLink: /images/header.jpg
    simpleIntro: Technical notes on agents, RL, systems, and visual explanation.
    detailIntro:
      <p>RTFSC</p>
      <p>精通各种程序语言的拼写</p>

# Follow links
follow:
  - text: GitHub
    url: https://github.com/light8lee/

# Links
customLinks:
  - item:
    - text: Github
      url: https://github.com/
    - text: Jekyll source
      url: https://github.com/jekyll/jekyll
    - text: Jekyll (English)
      url: https://jekyllrb.com/
    - text: Jekyll (中文)
      url: http://jekyllcn.com/
    message: Friends
  - item:
    - text: Jekyll Theme
      url: http://jekyllthemes.org/
    - text: zJiaJun
      url: https://github.com/zJiaJun/zJiaJun.github.io
