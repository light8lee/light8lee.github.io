---
layout: default
title: Categories
---
<section class="page-heading">
  <h1>Categories</h1>
  <p>Posts grouped by topic.</p>
</section>

<section class="category-list">
  {% for category in site.categories %}
  <article class="category-group" id="{{ category[0] | slugify }}-ref">
    <h2>{{ category[0] }}</h2>
    {% for post in category[1] %}
    <p><a href="{{ post.url | relative_url }}">{{ post.title }}</a></p>
    {% endfor %}
  </article>
  {% endfor %}
</section>
